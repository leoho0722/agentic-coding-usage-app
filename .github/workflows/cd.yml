name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  release:
    name: Build and Release
    runs-on: macos-15
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Read and validate version from RELEASE_VERSION file
        id: version
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"

          if [ ! -f RELEASE_VERSION ]; then
            echo "Error: RELEASE_VERSION file not found in repo root." >&2
            exit 1
          fi

          VERSION=$(cat RELEASE_VERSION | tr -d '[:space:]')
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Error: RELEASE_VERSION must contain a valid semver (e.g. 1.9.0), got: '$VERSION'" >&2
            exit 1
          fi

          NEW_TAG="v${VERSION}"

          # Compare new version against latest tag using sort -V; skip if not newer
          LATEST_VERSION="${LATEST_TAG#v}"
          HIGHER=$(printf '%s\n%s' "$LATEST_VERSION" "$VERSION" | sort -V | tail -n1)
          if [ "$HIGHER" != "$VERSION" ] || [ "$VERSION" = "$LATEST_VERSION" ]; then
            echo "RELEASE_VERSION ($VERSION) is not greater than latest tag ($LATEST_TAG). Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate Secrets.xcconfig
        if: steps.version.outputs.should_release == 'true'
        run: |
          cat > AgenticUsage/Configuration/Secrets.xcconfig << EOF
          GITHUB_CLIENT_ID = ${{ secrets.GH_CLIENT_ID }}
          CLAUDE_CLIENT_ID = ${{ secrets.CLAUDE_CLIENT_ID }}
          CODEX_CLIENT_ID = ${{ secrets.CODEX_CLIENT_ID }}
          ANTIGRAVITY_CLIENT_ID = ${{ secrets.ANTIGRAVITY_CLIENT_ID }}
          ANTIGRAVITY_CLIENT_SECRET = ${{ secrets.ANTIGRAVITY_CLIENT_SECRET }}
          EOF
        working-directory: AgenticUsage

      - name: Build AgenticCLI (arm64 release)
        if: steps.version.outputs.should_release == 'true'
        run: swift build -c release --arch arm64
        working-directory: AgenticCLI

      - name: Zip AgenticCLI binary
        if: steps.version.outputs.should_release == 'true'
        run: |
          ZIP_NAME="AgenticCLI-${{ steps.version.outputs.new_tag }}-arm64.zip"
          BIN_PATH=$(cd AgenticCLI && swift build -c release --arch arm64 --show-bin-path)
          cp "$BIN_PATH/AgenticCLI" ./agentic
          zip "$ZIP_NAME" agentic
          echo "cli_zip=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Archive AgenticUsage app
        if: steps.version.outputs.should_release == 'true'
        run: |
          xcodebuild archive \
            -project AgenticUsage.xcodeproj \
            -scheme AgenticUsage \
            -configuration Release \
            -archivePath /tmp/AgenticUsage.xcarchive \
            -skipMacroValidation \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SKIP_INSTALL=NO
        working-directory: AgenticUsage

      - name: Zip AgenticUsage app
        if: steps.version.outputs.should_release == 'true'
        run: |
          ZIP_NAME="AgenticUsage-${{ steps.version.outputs.new_tag }}.zip"
          cp -r /tmp/AgenticUsage.xcarchive/Products/Applications/AgenticUsage.app .
          zip -r "$ZIP_NAME" AgenticUsage.app
          echo "app_zip=$ZIP_NAME" >> "$GITHUB_ENV"

      - name: Create git tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping."
          else
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "Created and pushed tag $NEW_TAG."
          fi

      - name: Generate AI release notes
        id: ai_notes
        if: steps.version.outputs.should_release == 'true'
        continue-on-error: true
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          # 收集 commit messages
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --format='- %s' "$NEW_TAG")
          else
            COMMITS=$(git log --format='- %s' "${LATEST_TAG}..${NEW_TAG}")
          fi

          # 收集 diff stats
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            DIFF_STATS="Initial release"
          else
            DIFF_STATS=$(git diff --stat "${LATEST_TAG}..${NEW_TAG}")
          fi

          # 組裝 prompt
          PROMPT=$(cat <<PROMPT_EOF
          You are a release notes writer for AgenticUsage, a macOS menu bar app and CLI tool that monitors AI coding assistant usage (GitHub Copilot, Claude Code, OpenAI Codex, Google Antigravity).

          Rules:
          - Group by bilingual headers: "## ✨ Features / 功能", "## 🐛 Bug Fixes / 修正", "## ♻️ Improvements / 改進", "## 📄 Documentation / 文件", "## 🔧 Others / 其他"
          - Only include categories that have changes
          - Use the same language as the original commit message
          - Skip merge commits
          - Brand names should not be translated
          - Keep each bullet concise (1-2 sentences)
          - Do not include commit hashes or code block wrappers

          Version: ${LATEST_TAG} → ${NEW_TAG}

          Commits:
          ${COMMITS}

          Diff stats:
          ${DIFF_STATS}
          PROMPT_EOF
          )

          # 組裝 Ollama Cloud API payload
          PAYLOAD=$(jq -n \
            --arg model "qwen3-coder-next:cloud" \
            --arg prompt "$PROMPT" \
            '{
              model: $model,
              messages: [
                { role: "user", content: $prompt }
              ],
              stream: false
            }')

          # 呼叫 Ollama Cloud API
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            "https://ollama.com/api/chat" \
            -H "Authorization: Bearer $OLLAMA_API_KEY" \
            -d "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESPONSE" | tail -1 | sed 's/HTTP_STATUS://')
          RESPONSE_BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            AI_NOTES=$(echo "$RESPONSE_BODY" | jq -r '.message.content // empty')
            if [ -n "$AI_NOTES" ] && [ "$AI_NOTES" != "null" ]; then
              echo "ai_success=true" >> "$GITHUB_OUTPUT"
              printf '%s\n\n---\n*Release notes generated by Ollama Cloud (qwen3-coder-next)*\n' "$AI_NOTES" > /tmp/release_notes.md
              echo "AI release notes generated successfully."
            else
              echo "ai_success=false" >> "$GITHUB_OUTPUT"
              echo "Warning: AI response was empty."
            fi
          else
            echo "ai_success=false" >> "$GITHUB_OUTPUT"
            echo "Warning: Ollama Cloud API returned HTTP $HTTP_STATUS."
            echo "$RESPONSE_BODY"
          fi
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}

      - name: Create GitHub Release
        if: steps.version.outputs.should_release == 'true'
        run: |
          LATEST_TAG="${{ steps.version.outputs.latest_tag }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"

          if [ "${{ steps.ai_notes.outputs.ai_success }}" = "true" ]; then
            # 使用 AI 生成的 notes
            gh release create "$NEW_TAG" \
              --title "Release $NEW_TAG" \
              --notes-file /tmp/release_notes.md \
              "${{ env.cli_zip }}" \
              "${{ env.app_zip }}"
          else
            # Fallback: GitHub 自動生成
            NOTES_ARGS=(--generate-notes)
            if [ "$LATEST_TAG" != "v0.0.0" ]; then
              NOTES_ARGS+=(--notes-start-tag "$LATEST_TAG")
            fi
            gh release create "$NEW_TAG" \
              --title "Release $NEW_TAG" \
              "${NOTES_ARGS[@]}" \
              "${{ env.cli_zip }}" \
              "${{ env.app_zip }}"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute SHA256 of release artifacts
        if: steps.version.outputs.should_release == 'true'
        id: sha
        run: |
          CLI_SHA=$(shasum -a 256 "${{ env.cli_zip }}" | awk '{print $1}')
          APP_SHA=$(shasum -a 256 "${{ env.app_zip }}" | awk '{print $1}')
          echo "cli_sha256=$CLI_SHA" >> "$GITHUB_OUTPUT"
          echo "app_sha256=$APP_SHA" >> "$GITHUB_OUTPUT"

      - name: Update Homebrew Tap
        if: steps.version.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_tag }}"
          VERSION_NUM="${VERSION#v}"
          CLI_SHA="${{ steps.sha.outputs.cli_sha256 }}"
          APP_SHA="${{ steps.sha.outputs.app_sha256 }}"

          git clone "https://x-access-token:${TAP_TOKEN}@github.com/leoho0722/homebrew-tap.git" /tmp/homebrew-tap
          cd /tmp/homebrew-tap

          # 讀取目前版本（更新前）
          OLD_VERSION=$(grep -m1 'version "' Formula/agentic.rb | sed 's/.*version "\(.*\)"/\1/')

          # 清除舊的版本化檔案（不再建立版本化副本，只保留主 Formula / Cask 指向最新版）
          rm -f Formula/agentic@*.rb
          rm -f Casks/agentic-usage@*.rb

          # 更新主 Formula：URL、版本與 SHA256
          sed -i '' "s|/download/v[^/]*/AgenticCLI-v[^-]*-|/download/v${VERSION_NUM}/AgenticCLI-v${VERSION_NUM}-|" Formula/agentic.rb
          sed -i '' "s/version \".*\"/version \"${VERSION_NUM}\"/" Formula/agentic.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${CLI_SHA}\"/" Formula/agentic.rb

          # 更新主 Cask：版本與 SHA256（URL 使用 #{version} 插值，會自動跟著更新）
          sed -i '' "s/version \".*\"/version \"${VERSION_NUM}\"/" Casks/agentic-usage.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${APP_SHA}\"/" Casks/agentic-usage.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ Casks/
          git commit -m "Update to v${VERSION_NUM}"
          git push origin main
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_PAT }}
